version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: achados-perdidos-postgres
    environment:
      POSTGRES_DB: achados_perdidos
      POSTGRES_USER: ap_dev_user
      POSTGRES_PASSWORD: ap_ifpr_2026_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: achados-perdidos-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: CHAT_AP
      MONGO_INITDB_ROOT_PASSWORD: CHAT_AP_2026
      MONGO_INITDB_DATABASE: chat_achados_perdidos
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
