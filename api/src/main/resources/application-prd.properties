springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.url=/v1/api-docs

swagger.server.url=https://api-achadosperdidos.com.br
swagger.server.description=Servidor de PRD

server.forward-headers-strategy=framework
server.use-forward-headers=true

springdoc.packages-to-scan=com.AchadosPerdidos.API.Presentation.Controller
springdoc.paths-to-match=/api/**

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.resolve-schema-properties=true

springdoc.override-with-generic-response=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.default-model-expand-depth=-1
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true

# PostgreSQL - Neon
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# MongoDB - MongoDB Atlas
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=ap_achados_perdidos
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Google OAuth2
google.auth.client-id=${GOOGLE_AUTH_CLIENT_ID}
google.auth.client-secret=${GOOGLE_AUTH_CLIENT_SECRET}
google.auth.redirect-uri=${GOOGLE_AUTH_REDIRECT_URI}

# JWT
jwt.secret-key=${JWT_SECRET_KEY}
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}
jwt.expiry-in-minutes=${JWT_EXPIRY_IN_MINUTES}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Upload de arquivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2MB

# OneSignal (Push Notifications - Plano Gratuito: 10.000/mes)
onesignal.enabled=${ONESIGNAL_ENABLED:false}
onesignal.app-id=${ONESIGNAL_APP_ID:}
onesignal.rest-api-key=${ONESIGNAL_REST_API_KEY:}
onesignal.api-url=${ONESIGNAL_API_URL:https://api.onesignal.com/notifications}

# Cache Config (Caffeine)
cache.max-size=${CACHE_MAX_SIZE:500}
cache.expire-after-write-minutes=${CACHE_EXPIRE_MINUTES:15}
cache.expire-after-access-minutes=${CACHE_EXPIRE_AFTER_ACCESS_MINUTES:5}

